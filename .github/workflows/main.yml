name: XY_RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Otomatis running setiap 6 jam

jobs:
  XY_PROJECT:
    runs-on: windows-latest
    timeout-minutes: 360 

    steps:
      - name: 📥 CHECKOUT XY_PROJECT
        uses: actions/checkout@v4

      - name: 👤 SETUP USER XY & RDP (1080P)
        shell: powershell
        run: |
          # Password default: XYAdmin1080p! (Bisa diganti lewat GitHub Secrets)
          $password = "${{ secrets.XY_RDP_PASSWORD }}"
          if ([string]::IsNullOrEmpty($password)) { $password = "XYAdmin1080p!" }
          
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "haekal" -Password $securePass -FullName "XYkell" -Description "PoweredBy Kall & XyTeam"
          Add-LocalGroupMember -Group "Administrators" -Member "haekal"
          
          # Aktifkan Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Force Resolusi ke 1080p
          $rdpPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
          Set-ItemProperty -Path $rdpPath -Name "MaxXResolution" -Value 1920
          Set-ItemProperty -Path $rdpPath -Name "MaxYResolution" -Value 1080
          Write-Host "✅ User h4ck3r & RDP 1080p Ready! - PoweredBy Kall & XyTeam" -ForegroundColor Green

      - name: 📦 INSTALL & UPDATE TOOLS (VSCode, Spotify, Lightshot)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          Write-Host "🔄 Upgrading all existing tools..." -ForegroundColor Cyan
          choco upgrade all -y --no-progress
          
          Write-Host "🚀 Installing VSCode, Spotify, and Lightshot..." -ForegroundColor Cyan
          choco install vscode spotify lightshot -y --no-progress
          Write-Host "✅ All tools are ready to use!" -ForegroundColor Green

      - name: 🔌 TAILSCALE SETUP (MagicDNS Enabled)
        shell: powershell
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $out = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process msiexec.exe -ArgumentList "/i", "$out", "/quiet", "/norestart" -Wait
          
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          # Hostname statis agar MagicDNS 'xy-rdp-powered' selalu aktif
          & $tsExe up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="haekal" --accept-routes --reset
          
          $ip = & $tsExe ip -4
          Write-Host "🚀 TAILSCALE CONNECTED | IP: $ip" -ForegroundColor Cyan

      - name: ♾️ KEEP ALIVE XY (6 Hours Cycle)
        shell: powershell
        run: |
          $start = Get-Date
          Write-Host "🚀 XY-RDP Instance is now ONLINE." -ForegroundColor Green
          Write-Host "🔗 Connect via MagicDNS: xy-rdp-powered" -ForegroundColor Cyan
          
          while ((Get-Date) -lt $start.AddMinutes(345)) {
            $currentIp = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
            Write-Host "🕒 [$(Get-Date)] STATUS: ACTIVE | PUBLIC-IP: $currentIp | HOST: XY-RDP-POWERED" -ForegroundColor Green
            Start-Sleep -Seconds 180
          }
