name: XY_RDP_ULTIMATE_6H

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  XY_PROJECT:
    runs-on: windows-latest
    timeout-minutes: 360 

    steps:
      - name: 📥 CHECKOUT XY_PROJECT
        uses: actions/checkout@v4

      - name: 👤 SETUP USER XY & RDP
        shell: powershell
        run: |
          $password = "${{ secrets.XY_RDP_PASSWORD }}"
          if ([string]::IsNullOrEmpty($password)) { $password = "XYAdmin1080p!" }
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Hapus user lama jika ada (biar nggak bentrok kalau re-run)
          if (Get-LocalUser -Name "h4ck3r" -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name "h4ck3r"
          }
          
          New-LocalUser -Name "h4ck3r" -Password $securePass -FullName "XY Hacker" -Description "PoweredBy Kall & XyTeam"
          Add-LocalGroupMember -Group "Administrators" -Member "h4ck3r"
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "✅ RDP & User Ready!" -ForegroundColor Green

      - name: 📦 INSTALL TOOLS (Safe Mode)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          
          # Re-install Choco jika gagal
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          
          # Install satu-satu biar kalau satu error, yang lain tetep jalan
          $apps = @("vscode", "spotify", "lightshot")
          foreach ($app in $apps) {
            Write-Host "Installing $app..." -ForegroundColor Cyan
            choco install $app -y --no-progress --ignore-checksums
          }

      - name: 🔌 TAILSCALE SETUP
        shell: powershell
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $out = "$env:TEMP\tailscale.msi"
          (New-Object System.Net.WebClient).DownloadFile($url, $out)
          Start-Process msiexec.exe -ArgumentList "/i", "$out", "/quiet", "/norestart" -Wait
          
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          # Tambahkan --force-reauth biar fresh
          & $tsExe up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="XY-RDP-POWERED" --accept-routes --reset
          
          $ip = & $tsExe ip -4
          Write-Host "🚀 TAILSCALE IP: $ip" -ForegroundColor Cyan

      - name: ♾️ KEEP ALIVE XY
        shell: powershell
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddMinutes(345)) {
            Write-Host "🕒 [$(Get-Date)] XY-RDP ONLINE | HOST: XY-RDP-POWERED" -ForegroundColor Green
            Start-Sleep -Seconds 180
          }
